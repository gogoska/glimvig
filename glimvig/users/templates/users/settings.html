{% extends 'users/profile_base.html' %}
{% load static %}

{% block title %}Настройки — Glimvig{% endblock %}

{% block profile_content %}
    <h5 class="mb-3">Настройки профиля</h5>
    <form>
        <div class="mb-3">
            <label for="username" class="form-label">Никнейм</label>
            <input type="text" class="form-control" id="username" value="{{ user.username|default:'' }}">
        </div>
        <div class="mb-3">
            <label for="email" class="form-label">Email</label>
            <input type="email" class="form-control" id="email" value="{{ user.email|default:'' }}">
        </div>
        <div class="mb-3">
            <label for="avatar" class="form-label">Аватар</label>
            <input type="file" class="form-control" id="avatar">
        </div>
        <div class="mb-3">
            <label for="bio" class="form-label">О себе</label>
            <textarea class="form-control" id="bio" rows="3">{{ user.bio|default:'' }}</textarea>
        </div>
        <button type="submit" class="btn btn-primary">Сохранить</button>
    </form>
    <hr>
    <div class="mt-3">
        <a href="#" class="btn btn-outline-danger">Сменить пароль</a>
    </div>
{% endblock %}
